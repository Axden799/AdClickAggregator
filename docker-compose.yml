# Local dev services. Grows one service per slice (Redis + Postgres now;
# the app container comes in a later slice).
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adclick
      POSTGRES_PASSWORD: adclick
      POSTGRES_DB: adclick
    # Host 5433 -> container 5432. A native Postgres already owns host 5432
    # (used by another project), so we map to 5433 to avoid the clash.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
